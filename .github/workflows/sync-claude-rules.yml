name: Sync Claude Rules
on:
  repository_dispatch:
    types: [sync-claude-rules]
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Write global rules
        env:
          RULES_CONTENT: ${{ github.event.client_payload.content }}
        run: |
          mkdir -p .claude
          printf '%s\n' "$RULES_CONTENT" > .claude/global-rules.md
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/global-rules.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync global Claude rules from mandala"
          git push origin main
